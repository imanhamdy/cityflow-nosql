services:
  mongodb:
    image: mongo:7.0
    container_name: cityflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./seed/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-cityflow2025}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-cityflow}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cityflow-net

  mongo-express:
    image: mongo-express:1.0.2
    container_name: cityflow-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-cityflow2025}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-cityflow2025}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-student}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-nosql2025}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - cityflow-net

  redis:
    image: redis:7-alpine
    container_name: cityflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-cityflow2025} --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cityflow2025}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cityflow-net

  redis-seed:
    image: redis:7-alpine
    container_name: cityflow-redis-seed
    restart: "no"
    volumes:
      - ./seed/redis/init.sh:/init.sh:ro
    command: sh /init.sh
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-cityflow2025}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cityflow-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cityflow-redis-commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-cityflow2025}
      HTTP_USER: ${REDIS_COMMANDER_USER:-student}
      HTTP_PASSWORD: ${REDIS_COMMANDER_PASSWORD:-nosql2025}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cityflow-net

  cassandra:
    image: cassandra:4.1
    container_name: cityflow-cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: "CityFlow"
      CASSANDRA_DC: "dc1"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "128M"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - cityflow-net

  cassandra-seed:
    image: cassandra:4.1
    container_name: cityflow-cassandra-seed
    restart: "no"
    volumes:
      - ./seed/cassandra/init.cql:/init.cql:ro
    command: >
      sh -c "until cqlsh cassandra 9042 -e 'describe cluster' > /dev/null 2>&1;
             do echo 'Waiting for Cassandra...'; sleep 5; done
             && cqlsh cassandra 9042 -f /init.cql
             && echo 'Cassandra seed complete'"
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - cityflow-net

  cassandra-web:
    image: ipushc/cassandra-web
    container_name: cityflow-cassandra-web
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      CASSANDRA_HOST_IP: cassandra
      CASSANDRA_PORT: 9042
      HOST_PORT: ":8083"
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - cityflow-net

  neo4j:
    image: neo4j:5-community
    container_name: cityflow-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-cityflow2025}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-cityflow2025} 'RETURN 1' --non-interactive"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - cityflow-net

  neo4j-seed:
    image: neo4j:5-community
    container_name: cityflow-neo4j-seed
    restart: "no"
    volumes:
      - ./seed/neo4j/init.cypher:/init.cypher:ro
    command: >
      sh -c "until cypher-shell -a bolt://neo4j:7687 -u neo4j -p ${NEO4J_PASSWORD:-cityflow2025} 'RETURN 1' > /dev/null 2>&1;
             do echo 'Waiting for Neo4j...'; sleep 5; done
             && cypher-shell -a bolt://neo4j:7687 -u neo4j -p ${NEO4J_PASSWORD:-cityflow2025} -f /init.cypher
             && echo 'Neo4j seed complete'"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - cityflow-net

volumes:
  mongo_data:
  redis_data:
  cassandra_data:
  neo4j_data:

networks:
  cityflow-net:
    driver: bridge
