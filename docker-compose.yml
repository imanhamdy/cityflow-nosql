services:
  mongodb:
    image: mongo:7.0
    container_name: cityflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: cityflow2025
    networks:
      - cityflow-net

  mongo-express:
    image: mongo-express:1.0.2
    container_name: cityflow-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: cityflow2025
      ME_CONFIG_MONGODB_URL: mongodb://admin:cityflow2025@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: student
      ME_CONFIG_BASICAUTH_PASSWORD: nosql2025
    depends_on:
      - mongodb
    networks:
      - cityflow-net

  neo4j:
    image: neo4j:5-community
    container_name: cityflow-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-cityflow2025}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-cityflow2025} 'RETURN 1' --non-interactive"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - cityflow-net

  neo4j-seed:
    image: neo4j:5-community
    container_name: cityflow-neo4j-seed
    restart: "no"
    volumes:
      - ./seed/neo4j/init.cypher:/init.cypher:ro
    command: >
      sh -c "until cypher-shell -a bolt://neo4j:7687 -u neo4j -p ${NEO4J_PASSWORD:-cityflow2025} 'RETURN 1' > /dev/null 2>&1;
             do echo 'Waiting for Neo4j...'; sleep 5; done
             && cypher-shell -a bolt://neo4j:7687 -u neo4j -p ${NEO4J_PASSWORD:-cityflow2025} -f /init.cypher
             && echo 'Neo4j seed complete'"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - cityflow-net

volumes:
  mongo_data:
  neo4j_data:

networks:
  cityflow-net:
    driver: bridge
